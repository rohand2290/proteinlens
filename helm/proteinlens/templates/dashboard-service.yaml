apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proteinlens.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-service
spec:
  replicas: {{ .Values.dashboardService.replicaCount }}
  selector:
    matchLabels:
      {{- include "proteinlens.selectorLabels" (dict "component" "dashboard-service" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proteinlens.selectorLabels" (dict "component" "dashboard-service" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: dashboard-service
          image: {{ .Values.dashboardService.image.repository }}:{{ .Values.dashboardService.image.tag }}
          imagePullPolicy: {{ .Values.dashboardService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: proteinlens-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: password
          resources:
            {{- toYaml .Values.dashboardService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proteinlens.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-service
spec:
  selector:
    {{- include "proteinlens.selectorLabels" (dict "component" "dashboard-service" "root" .) | nindent 4 }}
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
