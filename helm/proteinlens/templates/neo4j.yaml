apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proteinlens.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      {{- include "proteinlens.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proteinlens.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: neo4j
          image: {{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}
          ports:
            - name: bolt
              containerPort: 7687
            - name: http
              containerPort: 7474
          env:
            - name: GRAPH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: password
            - name: NEO4J_AUTH
              value: "neo4j/$(GRAPH_DB_PASSWORD)"
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 40
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.neo4j.storage }}
---
# Headless service required for StatefulSet DNS (neo4j.{namespace}.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proteinlens.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  clusterIP: None
  selector:
    {{- include "proteinlens.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 4 }}
  ports:
    - name: bolt
      port: 7687
    - name: http
      port: 7474
---
# Ensures at least one Neo4j pod stays up during node drains/upgrades.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: neo4j-pdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proteinlens.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "proteinlens.selectorLabels" (dict "component" "neo4j" "root" .) | nindent 6 }}
