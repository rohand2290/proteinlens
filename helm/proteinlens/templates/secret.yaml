apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proteinlens.labels" . | nindent 4 }}
type: Opaque
data:
  # Override at install time: helm install ... --set neo4j.password=<secret>
  password: {{ .Values.neo4j.password | b64enc | quote }}
