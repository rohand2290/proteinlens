spring:
  application:
    name: ingestion-service

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:password}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ingestion-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

stringdb:
  base-url: https://string-db.org/api
  default-species: 9606        # Homo sapiens NCBI taxon ID
  required-score: 400          # Interaction confidence threshold (0–1000)
  network-type: physical       # "physical" or "functional"
  caller-identity: proteinlens # Identifies your app to STRING-DB

kafka:
  topics:
    ingestion-events: ingestion.events

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.proteinlens: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
