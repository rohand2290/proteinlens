apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: proteinlens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: proteinlens/ingestion-service:latest
          imagePullPolicy: IfNotPresent   # use local image in minikube/kind
          ports:
            - containerPort: 8081
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: password
            - name: SPRING_NEO4J_URI
              value: bolt://neo4j.proteinlens.svc.cluster.local:7687
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.proteinlens.svc.cluster.local:9092
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: proteinlens
spec:
  selector:
    app: ingestion-service
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
