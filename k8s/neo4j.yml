apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: proteinlens
type: Opaque
stringData:
  password: "password"   # change before deploying to any shared environment
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: proteinlens
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.18-community
          ports:
            - containerPort: 7474
            - containerPort: 7687
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: password
            - name: NEO4J_AUTH
              value: "neo4j/$(NEO4J_PASSWORD)"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 40
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: proteinlens
spec:
  selector:
    app: neo4j
  clusterIP: None   # headless — required for StatefulSet DNS
  ports:
    - name: bolt
      port: 7687
    - name: http
      port: 7474
